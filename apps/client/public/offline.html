<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recto Offline</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "DM Sans", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #f6f1e8 0%, #fffaf3 100%);
        color: #1f1f1f;
      }

      main {
        width: min(92vw, 34rem);
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        Recto could not reach the network right now. Reconnect and refresh to
        continue reading.
      </p>
    </main>
  </body>
</html>

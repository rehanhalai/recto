name: Deploy Client to Vercel

on:
  push:
    branches:
      - main
    paths:
      - apps/client/**
      - packages/types/**
      - packages/assets/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - package.json
      - .github/workflows/deploy-client-vercel.yml
  workflow_dispatch:

concurrency:
  group: deploy-client-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build only client app via Turborepo filter
        run: pnpm turbo run build --filter=@recto/client...

      - name: Install Vercel CLI
        run: pnpm dlx vercel@latest --version

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: pnpm dlx vercel@latest pull --cwd=apps/client --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: pnpm dlx vercel@latest deploy --cwd=apps/client --prod --token="$VERCEL_TOKEN"
